<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Especial ❤️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            touch-action: manipulation;
        }

        h1 {
            color: #d32f2f;
            font-size: 2.3rem;
            margin-bottom: 30px;
            padding: 0 20px;
            transition: all 0.5s ease;
        }

        .container-botoes {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            touch-action: manipulation;
        }

        #sim {
            background-color: #4caf50;
            color: white;
            position: absolute;
            left: 20%;
        }

        #sim:hover {
            transform: scale(1.1);
        }

        #nao {
            background-color: #f44336;
            color: white;
            position: absolute;
            right: 20%;
            transition: left 0.1s ease, top 0.1s ease; 
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <h1 id="titulo-principal">Topa sair comigo hoje a noite em um date dos namorados? 🌹</h1>

    <div class="container-botoes" id="container-botoes">
        <button id="sim" onclick="aceitou()">SIM!</button>
        <button id="nao" onmouseover="fugir(event)" ontouchstart="fugir(event)" onclick="fugir(event)">NÃO</button>
    </div>

    <script>
        function fugir(event) {
            // Evita o comportamento padrão do clique/toque e impede o travamento
            event.preventDefault(); 

            const botaoNao = document.getElementById('nao');
            
            // Margem de segurança para o botão não colar 100% na borda da tela
            const margem = 20; 
            const larguraJanela = window.innerWidth - botaoNao.offsetWidth - margem;
            const alturaJanela = window.innerHeight - botaoNao.offsetHeight - margem;

            // Posição atual
            const posAtualX = botaoNao.offsetLeft;
            const posAtualY = botaoNao.offsetTop;

            let novoX, novoY, tentativas = 0;
            do {
                novoX = Math.max(margem, Math.random() * larguraJanela);
                novoY = Math.max(margem, Math.random() * alturaJanela);
                tentativas++;
            } while (tentativas < 16 && Math.abs(novoX - posAtualX) < 50 && Math.abs(novoY - posAtualY) < 30);
            // Vai tentar até 16 vezes garantir distância (ou aceita para não travar)
            
            botaoNao.style.position = 'fixed';
            botaoNao.style.left = novoX + 'px';
            botaoNao.style.top = novoY + 'px';
        }

        function aceitou() {
            // Altera o texto principal
            document.getElementById('titulo-principal').innerHTML = 'Te pego hoje as 20h! 🤠';
            
            // Esconde os botões após o "SIM" ser clicado
            document.getElementById('container-botoes').style.display = 'none';

            // Cria uma div para a imagem de fundo centralizada em 80% da tela (atrás do texto)
            var fundo = document.createElement("div");
            fundo.id = "fundo-personalizado";
            fundo.style.position = "fixed";
            fundo.style.top = 0;
            fundo.style.left = 0;
            fundo.style.right = 0;
            fundo.style.bottom = 0;
            fundo.style.width = "100vw";
             fundo.style.height = "100vh";
             fundo.style.top = "0";
             fundo.style.left = "0";
             fundo.style.right = "0";
             fundo.style.bottom = "0";
             fundo.style.backgroundImage = "url('./dog.jpg')";
             fundo.style.backgroundSize = "contain"; // use 'contain' se quiser ver a imagem inteira
             fundo.style.backgroundPosition = "center";
            fundo.style.zIndex = "0";
            fundo.style.borderRadius = "24px";
            document.body.appendChild(fundo);

            // Deixa o corpo da página com fonte preta
            document.body.style.color = "black";
            // Garante que o título está sempre na frente da imagem
            var titulo = document.getElementById('titulo-principal');
            titulo.style.position = 'relative';
            titulo.style.zIndex = '1';
            titulo.style.color = 'black';
            // Fundo acrílico/translúcido
            titulo.style.background = 'rgba(255,255,255,0.6)';
            titulo.style.backdropFilter = 'blur(4px)';
            titulo.style.webkitBackdropFilter = 'blur(4px)'; // Suporte para Safari
            titulo.style.borderRadius = '18px';
            titulo.style.padding = '18px 30px';
        }
    </script>
</body>
</html>

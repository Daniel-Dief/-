        h1 {
            color: #d32f2f;
            font-size: 2.3rem;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        /* Texto da mensagem final */
        #mensagem-final {
            color: white;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            padding: 0 20px;
        }

        .container-botoes {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            touch-action: manipulation;
        }

        #sim {
            background-color: #4caf50;
            color: white;
            position: absolute;
            left: 20%;
        }

        #sim:hover {
            transform: scale(1.1);
            background-color: #43a047;
        }

        #nao {
            background-color: #f44336;
            color: white;
            position: absolute;
            right: 20%;
            transition: left 0.1s ease, top 0.1s ease; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* Ajustes para telas pequenas (Mobile) */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            #mensagem-final { font-size: 2.2rem; }
            button { padding: 12px 24px; font-size: 1rem; }
        }

<body>

    <div id="tela-convite">
        <h1 id="titulo-principal">Topa sair comigo hoje a noite em um date dos namorados? 🌹</h1>

        <div class="container-botoes">
            <button id="sim" onclick="aceitou()">SIM!</button>
            <button id="nao" onmouseover="fugir(event)" ontouchstart="fugir(event)" onclick="fugir(event)">NÃO</button>
        </div>
    </div>

    <div id="tela-sucesso">
        <div id="mensagem-final">Te vejo às 20h! ❤️</div>
    </div>

    <script>
        function fugir(event) {
            // Evita o comportamento padrão e impede que o botão "trave" no mobile
            event.preventDefault(); 
            
            const botaoNao = document.getElementById('nao');
            
            // Margem de segurança para o botão não colar na borda da tela
            const margem = 20; 
            const larguraJanela = window.innerWidth - botaoNao.offsetWidth - margem;
            const alturaJanela = window.innerHeight - botaoNao.offsetHeight - margem;
            
            // Sorteia a posição garantindo que fique dentro dos limites visíveis
            const novoX = Math.max(margem, Math.random() * larguraJanela);
            const novoY = Math.max(margem, Math.random() * alturaJanela);
            
            // Aplica a nova posição como 'fixed' para mover pela tela toda
            botaoNao.style.position = 'fixed';
            botaoNao.style.left = novoX + 'px';
            botaoNao.style.top = novoY + 'px';
        }

        function aceitou() {
            const telaConvite = document.getElementById('tela-convite');
            const telaSucesso = document.getElementById('tela-sucesso');

            // Esconde a tela de convite
            telaConvite.style.opacity = '0';
            
            // Após a transição de saída do convite, exibe a tela de sucesso
            setTimeout(() => {
                telaConvite.style.display = 'none';
                telaSucesso.style.display = 'flex';
                // Pequeno delay para a transição de fade-in funcionar
                setTimeout(() => {
                    telaSucesso.style.opacity = '1';
                }, 10);
            }, 500); // Tempo igual ao da transição do CSS (0.5s)
        }
    </script>
</body>
